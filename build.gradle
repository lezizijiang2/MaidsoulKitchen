// 初始化项目任务，替代init.bat
tasks.register("initProject") {
    group = buildGroup
    description = '项目初始化，如果使用过了 init.bat，就可以不用初始化了'
    dependsOn "ensureGradlewExecutable", "build"

    doLast {
        logger.lifecycle("========================================")
        logger.lifecycle("       MaidsoulKitchen 构建脚本 v2.0      ")
        logger.lifecycle("========================================")

        // 阶段1: 初始化设置
        logger.lifecycle("🚩 阶段1: 初始化设置")
        File sourceSettings = new File("${projectDir}/setting/common/settings.gradle")
        File targetSettings = new File("${projectDir}/settings.gradle")

        if (!sourceSettings.exists()) {
            throw new GradleException("源设置文件不存在: ${sourceSettings}")
        }

        copy {
            from sourceSettings
            into projectDir
            rename { filename -> "settings.gradle" }
        }
        logger.lifecycle("✅ 设置文件初始化完成")

        // 阶段2: 清理残存文件
        logger.lifecycle("🚩 阶段2: 清理残存文件")
        cleanOldJars(new File("${projectDir}/Legacy/libs/${minecraft_version}/legacy"), ".*\\.jar")
        cleanOldJars(new File("${projectDir}/Legacy/build/libs"), ".*\\.jar")
        cleanOldJars(new File("${projectDir}/libs/${minecraft_version}/legacy"), ".*\\.jar")
        cleanOldJars(new File("${projectDir}/build/libs"), ".*\\.jar")

        // 阶段3: 第一次构建 - 已通过dependsOn处理，不需要直接调用execute()
        // project.getTasksByName("build", false).first().execute()

        // 阶段4: 复制构建产物���Legacy
        logger.lifecycle("🚩 阶段4: 复制构建产物到Legacy")
        File buildDir = new File("${projectDir}/build/libs")
        File legacyLibsDir = new File("${projectDir}/Legacy/libs/${minecraft_version}/legacy")
        buildDir.listFiles().each { file ->
            if (file.name.endsWith("-all.jar")) {
                copyJarFile(file, legacyLibsDir)
            }
        }

        // 阶段5: 构建Legacy项目
        logger.lifecycle("🚩 阶段5: 构建Legacy项目")
        exec {
            workingDir "${projectDir}/Legacy"
            if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
                commandLine 'cmd', '/c', 'gradlew.bat', 'build'
            } else {
                commandLine './gradlew', 'build'
            }
        }

        // 阶段6: 复制Legacy构建产物
        logger.lifecycle("🚩 阶段6: 复制Legacy构建产物")
        File legacyBuildDir = new File("${projectDir}/Legacy/build/libs")
        File modsLibsDir = new File("${projectDir}/libs/${minecraft_version}/legacy")
        legacyBuildDir.listFiles().each { file ->
            if (file.name.endsWith("-all.jar")) {
                copyJarFile(file, modsLibsDir)
            }
        }

        // 阶段7: 最终设置和构建
        logger.lifecycle("🚩 阶段7: 最终设置和构建")
        File sourceAllSettings = new File("${projectDir}/setting/common/settings-all.gradle")

        if (!sourceAllSettings.exists()) {
            throw new GradleException("源设置文件不存在: ${sourceAllSettings}")
        }

        copy {
            from sourceAllSettings
            into projectDir
            rename { filename -> "settings.gradle" }
        }

        logger.lifecycle("========================================")
        logger.lifecycle("          ✅ 所有任务已成功完成!            ")
        logger.lifecycle("========================================")
    }
}

