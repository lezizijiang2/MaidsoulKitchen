// 辅助函数 - 清理旧JAR文件
def cleanOldJars(File dir, String pattern, String excludePattern = null) {
    if (!dir.exists()) {
        logger.warn("目标目录不存在，跳过删除操作: ${dir}")
        return
    }

    int deletedFiles = 0
    dir.listFiles().each { file ->
        if (file.name.matches(pattern) && (excludePattern == null || !file.name.matches(excludePattern))) {
            logger.lifecycle("删除: ${file.name}")
            file.delete()
            deletedFiles++
        }
    }

    if (deletedFiles > 0) {
        logger.lifecycle("✅ 成功删除 ${deletedFiles} 个旧版本JAR文件")
    } else {
        logger.warn("⚠️ 未找到需要删除的旧版本JAR文件")
    }
}

// 复制JAR文件
def copyJarFile(File sourceFile, File targetDir) {
    if (!sourceFile.exists()) {
        throw new GradleException("源文件不存在: ${sourceFile}")
    }

    if (!targetDir.exists()) {
        targetDir.mkdirs()
    }

    logger.lifecycle("复制文件: ${sourceFile.name} 到 ${targetDir}")
    copy {
        from sourceFile
        into targetDir
    }
    logger.lifecycle("✅ 文件复制成功: ${sourceFile.name}")
}

