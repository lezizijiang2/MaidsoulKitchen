// 确保gradlew脚本有执行权限的辅助任务
tasks.register("ensureGradlewExecutable") {
    group = null  // 隐藏此任务
    description = '确保Legacy项目中的gradlew脚本具有执行权限'

    doLast {
        if (!org.gradle.internal.os.OperatingSystem.current().isWindows()) {
            logger.lifecycle("确保Legacy项目中的gradlew脚本具有执行权限")
            exec {
                workingDir "${projectDir}/Legacy"
                commandLine 'chmod', '+x', 'gradlew'
            }
            logger.lifecycle("✅ 已设置执行权限")
        }
    }
}

// 合并build2Legacy.bat脚本到Gradle任务
tasks.register("build2Legacy") {
    group = buildGroup
    description = '构建MaidsoulKitchen给Legacy做兼容使用'
    dependsOn "ensureGradlewExecutable", "build"

    doLast {
        logger.lifecycle("========================================")
        logger.lifecycle("      MaidsoulKitchen Legacy构建脚本      ")
        logger.lifecycle("========================================")

        // 获取项目属性
        logger.lifecycle("🚩 阶段1: 获取项目属性")
        logger.lifecycle("⚠️ 项目属性: MOD_ID=${mod_id}, VERSION=${version}, MINECRAFT_VERSION=${minecraft_version}")

        // 清理Build旧版本JAR文件
        logger.lifecycle("🚩 阶段2: 清理Build旧版本JAR文件")
        File buildDir = new File("${projectDir}/build/libs")
        cleanOldJars(buildDir, "${mod_id}.*\\.jar", "${mod_id}-${version}.*\\.jar")

        // 复制JAR文件到Legacy项目
        logger.lifecycle("🚩 阶段4: 复制JAR文件到Legacy项目")
        File sourceJar = new File("${projectDir}/build/libs/${mod_id}-${version}-all.jar")
        File targetDir = new File("${projectDir}/Legacy/libs/${minecraft_version}/legacy")
        copyJarFile(sourceJar, targetDir)

        // 清理旧版本JAR文件
        logger.lifecycle("🚩 阶段5: 清理旧版本JAR文件")
        cleanOldJars(targetDir, "${mod_id}.*\\.jar", "${mod_id}-${version}-all\\.jar")

        // 重载Legacy依赖
        logger.lifecycle("🚩 阶段6: 重载Legacy依赖")
        exec {
            workingDir "${projectDir}/Legacy"
            if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
                commandLine 'cmd', '/c', 'gradlew.bat'
            } else {
                commandLine './gradlew'
            }
        }

        logger.lifecycle("========================================")
        logger.lifecycle("          ✅ 所有任务已成功完成!            ")
        logger.lifecycle("========================================")
    }
}

